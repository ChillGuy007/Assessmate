version: '3.8'

services:
  backend:
    image: node:18-alpine
    container_name: assessmate-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - JWT_SECRET=dev_secret_change_in_production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/assessmate
    command: sh -c "npm install && npm run dev"
    networks:
      - assessmate-network

  frontend:
    image: node:22-alpine
    container_name: assessmate-frontend
    working_dir: /app
    volumes:
      - ./Assessmate:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - assessmate-network

  postgres:
    image: postgres:15
    container_name: assessmate-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=assessmate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - assessmate-network

  seed:
    image: node:18-alpine
    container_name: assessmate-seed
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/assessmate
    command: sh -c "npm install && node seed.js"
    restart: 'no'
    networks:
      - assessmate-network

networks:
  assessmate-network:
    driver: bridge

volumes:
  pgdata:
